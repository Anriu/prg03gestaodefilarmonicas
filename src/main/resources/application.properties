spring.datasource.url=jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:5432/postgres?sslmode=require

# Usu\u00e1rio obrigat\u00f3rio gerado pelo Pooler (postgres.[ID_DO_PROJETO])
spring.datasource.username=postgres.cgqqqlgzggrlnptdtsck

# Sua senha do banco de dados protegida contra caracteres especiais
spring.datasource.password=.gg@.ePZ!KUBe5r

# Driver oficial do PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# ====================================================================
# CONFIGURA\u00c7\u00d5ES DO HIBERNATE / JPA
# ====================================================================

# 'update' faz com que o Hibernate crie ou atualize as tabelas automaticamente com base nas classes Java
spring.jpa.hibernate.ddl-auto=update

# Exibe as consultas SQL geradas pelo Hibernate no console do NetBeans
spring.jpa.show-sql=true

# Formata o SQL exibido no console para torn\u00e1-lo leg\u00edvel
spring.jpa.properties.hibernate.format_sql=true

# Plataforma/Dialeto do PostgreSQL para que o Hibernate gere a sintaxe correta
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect